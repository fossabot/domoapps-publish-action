name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linter
        run: yarn run lint

      - name: Run tests
        run: yarn test

      - name: Build action
        run: yarn run build

      - name: Test action locally
        run: |
          # Test that the action can be built and runs without errors
          node dist/index.js
        env:
          INPUT_DOMO-TOKEN: ${{ secrets.DOMO_TOKEN }}
          INPUT_DOMO-INSTANCE: https://test.domo.com
          INPUT_BUILD-COMMAND: echo "test build"
          INPUT_WORKING-DIRECTORY: .
