name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linter
        run: yarn run lint

      - name: Run tests
        run: yarn test

      - name: Build action
        run: yarn run build

      - name: Test action locally
        run: |
          # Test that the action file is valid JavaScript
          node -c dist/index.js
          echo "✅ Action file is valid JavaScript"

          # Test that the action can start (will fail at authentication, which is expected)
          timeout 10s node dist/index.js || true
          echo "✅ Action started successfully (authentication failure is expected)"
