name: 'Domo Publish Action'
description: 'Deploy Domo apps from GitHub to a Domo instance using ryuu'
branding:
  icon: 'upload-cloud'
  color: 'blue'
inputs:
  domo-token:
    description: 'Domo API token for authentication'
    required: true
  domo-instance:
    description: 'Domo instance URL (e.g., https://your-company.domo.com)'
    required: true
  build-command:
    description: 'Optional build command to run before deployment'
    required: false
  working-directory:
    description: 'Working directory for the action'
    required: false
    default: '.'
outputs:
  deployment-status:
    description: 'Status of the deployment'
    value: ${{ steps.deploy.outputs.status }}
  app-url:
    description: 'URL of the deployed app'
    value: ${{ steps.deploy.outputs.app-url }}
runs:
  using: 'node20'
  main: 'dist/index.js'
