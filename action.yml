name: "Domo Publish Action"
description: "Deploy Domo apps from GitHub to a Domo instance using ryuu"
branding:
  icon: "upload-cloud"
  color: "blue"
inputs:
  domo-token:
    description: "Domo API token for authentication"
    required: true
  domo-instance:
    description: "Domo instance URL (e.g., https://your-company.domo.com)"
    required: true
  github-token:
    description: "GitHub token used to open a PR adding the design id to manifest.json when a new design is created. Pass secrets.GITHUB_TOKEN. Requires permissions: contents: write and pull-requests: write on the workflow."
    required: false
  build-command:
    description: "Optional build command to run before deployment (runs inside working-directory)"
    required: false
  working-directory:
    description: "Source directory where dependencies install and the build command runs"
    required: false
    default: "."
  publish-dir:
    description: "Path to the built artifact to publish (e.g., ./build, ./dist). Resolved relative to working-directory. Defaults to working-directory."
    required: false
    default: ""
outputs:
  deployment-status:
    description: "Status of the deployment"
  app-url:
    description: "URL of the deployed app"
  design-id:
    description: "Domo design ID — only set when a new design is created for the first time"
runs:
  using: "node24"
  main: "dist/index.js"
